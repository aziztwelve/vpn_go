version: '3'

vars:
  SERVICES_DIR: ./services
  BIN_DIR: ./bin
  PROTO_DIR: ./shared/proto
  PROTO_OUT_DIR: ./shared/pkg/proto
  COMPOSE_FILE: ./deploy/compose/docker-compose.yml
  COMPOSE_DEV_FILE: ./deploy/compose/docker-compose.dev.yml
  ENV_DIR: ./deploy/env
  MASTER_ENV: ./deploy/env/.env
  ENVSUBST_VERSION: 'v1.4.3'
  ENVSUBST: ./bin/envsubst
  SERVICES: 'auth,sub,vpn,payment,referral,gateway'

tasks:
  # ==================== ENV MANAGEMENT ====================

  env:install-envsubst:
    desc: "Install envsubst (github.com/a8m/envsubst) into ./bin"
    cmds:
      - |
        mkdir -p {{.BIN_DIR}}
        if [ ! -x {{.ENVSUBST}} ]; then
          echo "📦 Installing envsubst {{.ENVSUBST_VERSION}}..."
          GOBIN=$(pwd)/{{.BIN_DIR}} go install github.com/a8m/envsubst/cmd/envsubst@{{.ENVSUBST_VERSION}}
        fi
    status:
      - test -x {{.ENVSUBST}}

  env:generate:
    desc: "Generate per-service .env files from deploy/env/.env + <svc>.env.template"
    deps: [env:install-envsubst]
    cmds:
      - |
        if [ ! -f {{.MASTER_ENV}} ]; then
          echo "🔄 Creating {{.MASTER_ENV}} from template"
          cp {{.ENV_DIR}}/.env.template {{.MASTER_ENV}}
        fi
      - SERVICES={{.SERVICES}} ENV_SUBST=$(pwd)/{{.ENVSUBST}} bash {{.ENV_DIR}}/generate-env.sh

  env:show:
    desc: "Print master .env (gitignored)"
    cmds:
      - cat {{.MASTER_ENV}}

  # ==================== DEV (host) ====================

  dev:auth:
    desc: Run auth-service locally (reads deploy/env/auth.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/auth-service"
    dotenv: ['../../deploy/env/auth.env']
    cmds:
      - go run cmd/main/main.go

  dev:sub:
    desc: Run subscription-service locally (reads deploy/env/sub.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/subscription-service"
    dotenv: ['../../deploy/env/sub.env']
    cmds:
      - go run cmd/main/main.go

  dev:vpn:
    desc: Run vpn-service locally (reads deploy/env/vpn.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/vpn-service"
    dotenv: ['../../deploy/env/vpn.env']
    cmds:
      - go run cmd/main/main.go

  dev:payment:
    desc: Run payment-service locally (reads deploy/env/payment.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/payment-service"
    dotenv: ['../../deploy/env/payment.env']
    cmds:
      - go run cmd/main/main.go

  dev:referral:
    desc: Run referral-service locally (reads deploy/env/referral.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/referral-service"
    dotenv: ['../../deploy/env/referral.env']
    cmds:
      - go run cmd/main/main.go

  dev:gateway:
    desc: Run gateway locally (reads deploy/env/gateway.env)
    deps: [env:generate]
    dir: "{{.SERVICES_DIR}}/gateway"
    dotenv: ['../../deploy/env/gateway.env']
    cmds:
      - go run cmd/main/main.go

  # ==================== BUILD ====================

  build:auth:
    desc: Build auth-service binary
    dir: "{{.SERVICES_DIR}}/auth-service"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/auth-service cmd/main/main.go

  build:sub:
    desc: Build subscription-service binary
    dir: "{{.SERVICES_DIR}}/subscription-service"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/subscription-service cmd/main/main.go

  build:vpn:
    desc: Build vpn-service binary
    dir: "{{.SERVICES_DIR}}/vpn-service"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/vpn-service cmd/main/main.go

  build:payment:
    desc: Build payment-service binary
    dir: "{{.SERVICES_DIR}}/payment-service"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/payment-service cmd/main/main.go

  build:referral:
    desc: Build referral-service binary
    dir: "{{.SERVICES_DIR}}/referral-service"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/referral-service cmd/main/main.go

  build:gateway:
    desc: Build gateway binary
    dir: "{{.SERVICES_DIR}}/gateway"
    cmds:
      - go build -o ../../{{.BIN_DIR}}/gateway cmd/main/main.go

  build-all:
    desc: Build all services
    cmds:
      - task: build:auth
      - task: build:sub
      - task: build:vpn
      - task: build:payment
      - task: build:referral
      - task: build:gateway

  # ==================== PROTO ====================

  proto:install-plugins:
    desc: Install protoc-gen-go + protoc-gen-go-grpc into ./bin
    cmds:
      - |
        mkdir -p {{.BIN_DIR}}
        if [ ! -x {{.BIN_DIR}}/protoc-gen-go ]; then
          echo "📦 Installing protoc-gen-go..."
          GOBIN=$(pwd)/{{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
        fi
        if [ ! -x {{.BIN_DIR}}/protoc-gen-go-grpc ]; then
          echo "📦 Installing protoc-gen-go-grpc..."
          GOBIN=$(pwd)/{{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
        fi
    status:
      - test -x {{.BIN_DIR}}/protoc-gen-go
      - test -x {{.BIN_DIR}}/protoc-gen-go-grpc

  proto:gen:
    desc: Generate Go code from proto files
    deps: [proto:install-plugins]
    cmds:
      - mkdir -p {{.PROTO_OUT_DIR}}
      - |
        bash -c '
          export PATH="$PWD/{{.BIN_DIR}}:$PATH"
          while IFS= read -r -d "" proto; do
            echo "  🔧 $proto"
            protoc --go_out={{.PROTO_OUT_DIR}} --go_opt=paths=source_relative \
                   --go-grpc_out={{.PROTO_OUT_DIR}} --go-grpc_opt=paths=source_relative \
                   -I={{.PROTO_DIR}} "$proto"
          done < <(find {{.PROTO_DIR}} -type f -name "*.proto" -print0)
        '

  # ==================== COMPOSE ====================
  # MODE=dev (по умолчанию) — gateway опубликован на :8081, без caddy.
  # MODE=prod                — только caddy:443 терминирует TLS, gateway внутри сети.

  compose:up:
    desc: "Start full stack. MODE=dev (default) | prod"
    deps: [env:generate]
    cmds:
      - |
        MODE="{{.MODE | default "dev"}}"
        if [ "$MODE" = "prod" ]; then
          docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d --build
        else
          docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} up -d --build
        fi

  compose:down:
    desc: Stop full stack (works for both dev and prod)
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} --profile prod down

  compose:down-v:
    desc: Stop stack AND remove postgres volume (wipes DB)
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} --profile prod down -v

  compose:logs:
    desc: Tail logs of the full stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} --profile prod logs -f

  compose:ps:
    desc: Show status of the stack
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} --profile prod ps

  compose:rebuild:
    desc: Rebuild all service images from scratch
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} -f {{.COMPOSE_DEV_FILE}} --env-file {{.MASTER_ENV}} --profile prod build --no-cache

  # ==================== XRAY ====================

  xray:up:
    desc: Start only the Xray container (требует уже поднятой compose-сети — сначала task compose:up)
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} up -d xray

  xray:restart:
    desc: Restart Xray container (apply new config.json)
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} restart xray

  xray:logs:
    desc: Tail Xray logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} logs -f xray

  xray:genkeys:
    desc: "Generate new Reality x25519 keypair + short_id (print, not saved)"
    cmds:
      - |
        echo "--- Reality x25519 keys ---"
        docker run --rm ghcr.io/xtls/xray-core:latest x25519
        echo "--- short_id (8 bytes hex) ---"
        openssl rand -hex 8

  # ==================== DATABASE ====================

  db:up:
    desc: Start only PostgreSQL from the stack
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} up -d postgres

  db:psql:
    desc: Open psql shell in the running postgres container
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      - docker exec -it vpn-postgres psql -U ${POSTGRES_USER} -d ${POSTGRES_DB}

  # ==================== MIGRATIONS ====================
  # Используют compose-сервис `migrate` (см. docker-compose.yml). Сеть/volume
  # имена больше не хардкодим — compose сам резолвит project name.
  # Стек должен быть поднят как минимум до postgres (task db:up или compose:up).

  migrate:up:
    desc: Apply all migrations (auth → subscription → vpn → payment → referral)
    deps: [env:generate]
    cmds:
      # `up migrate` пересоздаёт one-shot контейнер с дефолтным entrypoint,
      # который проходится по всем сервисам и применяет миграции.
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} up --force-recreate migrate

  migrate:down:
    desc: Roll back all migrations (referral → payment → vpn → subscription → auth)
    deps: [env:generate]
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      # Используем тот же образ migrate/migrate:4 что и compose-сервис, через
      # `compose run` — это даёт правильную сеть и volumes без хардкода.
      # Креды передаём через -e (host-side dotenv) чтобы не мучиться с экранированием.
      # Порядок rollback'а — обратный up: сначала referral (зависит от users),
      # потом payment/vpn/subscription, последним auth (он определяет users).
      - |
        docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} run --rm \
          -e DB_URL_BASE="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable" \
          --entrypoint sh migrate -c '
            for svc in referral payment vpn subscription auth; do
              echo ">>> rolling back $svc";
              migrate -path /migrations/$svc \
                -database "${DB_URL_BASE}&x-migrations-table=${svc}_schema_migrations" \
                down -all || exit 1;
            done
          '

  # ==================== CADDY (public HTTPS edge) ====================
  # Все таски требуют запущенного caddy-контейнера (task compose:up MODE=prod).

  caddy:up:
    desc: Start only caddy (requires gateway to be up already)
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d caddy

  caddy:reload:
    desc: Reload Caddy config without restarting (picks up Caddyfile changes)
    cmds:
      - docker exec vpn-caddy caddy reload --config /etc/caddy/Caddyfile

  caddy:restart:
    desc: Full restart of Caddy container (re-reads env vars)
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod restart caddy

  caddy:logs:
    desc: Tail Caddy logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod logs -f caddy

  caddy:cert-info:
    desc: List issued certificates inside the caddy volume
    cmds:
      - |
        docker exec vpn-caddy sh -c '
          if [ -d /data/caddy/certificates ]; then
            ls -la /data/caddy/certificates/*/* 2>/dev/null || echo "No certs yet — Caddy issues on first HTTPS request.";
          else
            echo "Caddy data dir empty — first request will trigger ACME.";
          fi
        '

  caddy:go-prod:
    desc: "Switch from LE staging to production certs (wipes caddy volume!)"
    prompt: "This will remove staging certs and request fresh production ones. Continue?"
    cmds:
      - sed -i.bak '/^\s*acme_ca https:\/\/acme-staging/d' deploy/compose/caddy/Caddyfile
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod down caddy
      # Удаляем volume через compose чтобы не хардкодить vpn-stack_vpn_caddy_data.
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod down -v caddy || true
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d caddy
      - echo "✅ Switched to LE prod. Tail logs with 'task caddy:logs' to watch cert issuance."

  domain:swap:
    desc: 'Swap API domain in .env. Usage: task domain:swap NEW=api.example.com'
    preconditions:
      - sh: '[ -n "{{.NEW}}" ]'
        msg: "Usage: task domain:swap NEW=api.example.com"
    cmds:
      - sed -i.bak "s/^API_DOMAIN=.*/API_DOMAIN={{.NEW}}/" {{.MASTER_ENV}}
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d caddy
      - echo "API domain swapped to {{.NEW}}. Caddy will issue cert on first request (needs A-record → VPS IP)."

  domain:swap-cdn:
    desc: 'Swap CDN (Mini App) domain in .env. Usage: task domain:swap-cdn NEW=cdn.example.com'
    preconditions:
      - sh: '[ -n "{{.NEW}}" ]'
        msg: "Usage: task domain:swap-cdn NEW=cdn.example.com"
    cmds:
      - sed -i.bak "s/^CDN_DOMAIN=.*/CDN_DOMAIN={{.NEW}}/" {{.MASTER_ENV}}
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d caddy
      - echo "CDN domain swapped to {{.NEW}}. Don't forget to update @BotFather Mini App URL."

  # ==================== NEXT (Telegram Mini App, vpn_next) ====================

  next:build:
    desc: Rebuild vpn-next image from scratch
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod build --no-cache vpn-next
      - docker builder prune -f

  next:up:
    desc: Start only vpn-next container
    deps: [env:generate]
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod up -d --build vpn-next

  next:restart:
    desc: Restart vpn-next container (after code/env change)
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod restart vpn-next

  next:logs:
    desc: Tail vpn-next logs
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} --env-file {{.MASTER_ENV}} --profile prod logs -f vpn-next

  # ==================== TELEGRAM BOT ====================
  # One-off операции над ботом: регистрация webhook и default menu-button.
  # Читают AUTH_TELEGRAM_BOT_TOKEN, API_DOMAIN, MINIAPP_URL, PAYMENT_TELEGRAM_WEBHOOK_SECRET
  # из master .env.
  #
  # ⚠️ В gateway есть два эндпоинта (/telegram/webhook и /telegram/bot-webhook),
  # но Telegram даёт один webhook на бота. Сейчас регистрируем /telegram/webhook
  # с allowed_updates на весь набор; bot-webhook — потенциально dead-code,
  # это вопрос к gateway/handler-у, не к Taskfile.

  bot:info:
    desc: "Показать состояние бота (getMe + getWebhookInfo + menu-button)"
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      - |
        T="$AUTH_TELEGRAM_BOT_TOKEN"
        echo "=== getMe ==="
        curl -s "https://api.telegram.org/bot$T/getMe" | python3 -m json.tool
        echo ""
        echo "=== getWebhookInfo ==="
        curl -s "https://api.telegram.org/bot$T/getWebhookInfo" | python3 -m json.tool
        echo ""
        echo "=== getChatMenuButton (default) ==="
        curl -s "https://api.telegram.org/bot$T/getChatMenuButton" | python3 -m json.tool

  bot:set-menu:
    desc: "Default menu-button → открывает Mini App (MINIAPP_URL)"
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      - |
        T="$AUTH_TELEGRAM_BOT_TOKEN"
        URL="$MINIAPP_URL"
        if [ -z "$URL" ]; then
          echo "❌ MINIAPP_URL пустой. Укажи его в {{.MASTER_ENV}}."
          exit 1
        fi
        echo "Ставим menu-button → $URL"
        curl -s -X POST "https://api.telegram.org/bot$T/setChatMenuButton" \
          -H "Content-Type: application/json" \
          -d "{\"menu_button\":{\"type\":\"web_app\",\"text\":\"🚀 Открыть\",\"web_app\":{\"url\":\"$URL\"}}}" \
          | python3 -m json.tool

  bot:set-webhook:
    desc: "Регистрирует webhook gateway'я с полным набором allowed_updates"
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      - |
        T="$AUTH_TELEGRAM_BOT_TOKEN"
        SECRET="$PAYMENT_TELEGRAM_WEBHOOK_SECRET"
        URL="https://$API_DOMAIN/api/v1/telegram/webhook"
        if [ -z "$SECRET" ] || [ "$SECRET" = "change_me_random_string_webhook_secret" ]; then
          echo "❌ PAYMENT_TELEGRAM_WEBHOOK_SECRET не задан или дефолтный. Сгенерируй и запиши в .env:"
          echo "    openssl rand -hex 32"
          exit 1
        fi
        echo "Регистрируем webhook → $URL"
        # allowed_updates покрывает все три типа: команды/коллбэки/платежи.
        # Раньше часть из них висела в отдельном setup_bot_webhook.sh с другим URL —
        # тот скрипт удалён, единый источник правды теперь здесь.
        curl -s -X POST "https://api.telegram.org/bot$T/setWebhook" \
          -H "Content-Type: application/json" \
          -d "{\"url\":\"$URL\",\"secret_token\":\"$SECRET\",\"allowed_updates\":[\"message\",\"callback_query\",\"pre_checkout_query\"],\"drop_pending_updates\":false}" \
          | python3 -m json.tool

  bot:setup:
    desc: "Полный setup бота: set-menu + set-webhook + показать info"
    cmds:
      - task: bot:set-menu
      - task: bot:set-webhook
      - task: bot:info

  bot:delete-webhook:
    desc: "Удалить webhook (для отладки через long-polling)"
    dotenv: ['{{.MASTER_ENV}}']
    cmds:
      - |
        T="$AUTH_TELEGRAM_BOT_TOKEN"
        curl -s "https://api.telegram.org/bot$T/deleteWebhook" | python3 -m json.tool

  # ==================== UTIL ====================

  clean:
    desc: Clean build artifacts (binaries + generated proto + per-service .env files)
    cmds:
      - rm -rf {{.BIN_DIR}}/*
      - rm -rf {{.PROTO_OUT_DIR}}/*
      - rm -f {{.ENV_DIR}}/auth.env {{.ENV_DIR}}/sub.env {{.ENV_DIR}}/vpn.env {{.ENV_DIR}}/payment.env {{.ENV_DIR}}/referral.env {{.ENV_DIR}}/gateway.env
