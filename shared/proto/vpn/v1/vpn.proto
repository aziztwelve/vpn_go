syntax = "proto3";

package vpn.v1;

option go_package = "github.com/vpn/shared/pkg/proto/vpn/v1";

service VPNService {
  // Создать VPN пользователя (после покупки подписки)
  rpc CreateVPNUser(CreateVPNUserRequest) returns (CreateVPNUserResponse);
  
  // Получить VPN пользователя
  rpc GetVPNUser(GetVPNUserRequest) returns (GetVPNUserResponse);
  
  // Получить VLESS ссылку для подключения
  rpc GetVLESSLink(GetVLESSLinkRequest) returns (GetVLESSLinkResponse);
  
  // Получить список серверов
  rpc ListServers(ListServersRequest) returns (ListServersResponse);
  
  // Получить активные подключения пользователя
  rpc GetActiveConnections(GetActiveConnectionsRequest) returns (GetActiveConnectionsResponse);
  
  // Отключить устройство
  rpc DisconnectDevice(DisconnectDeviceRequest) returns (DisconnectDeviceResponse);

  // Физически удалить VPN пользователя (RemoveUser во всех Xray inbound'ах + DELETE vpn_users).
  // Вызывается payment-service при refund и subscription-service при истечении подписки.
  rpc DisableVPNUser(DisableVPNUserRequest) returns (DisableVPNUserResponse);

  // Пропушить ВСЕХ существующих vpn_users в inbound нового сервера.
  // Вызывается после INSERT нового vpn_servers при масштабировании.
  // Идемпотентно (already exists → skip).
  rpc ResyncServer(ResyncServerRequest) returns (ResyncServerResponse);

  // Собрать данные для публичной подписки по subscription_token.
  // Вызывается gateway-ом на GET /api/v1/subscription/{token}.
  // Не требует user_id: токен сам себе идентификатор.
  rpc GetSubscriptionConfig(GetSubscriptionConfigRequest) returns (GetSubscriptionConfigResponse);

  // Получить subscription_token текущего юзера. Вызывается Mini App'ом
  // (gateway проксирует с JWT), чтобы собрать URL подписки на фронте.
  // Если vpn_user не создан (нет активной подписки) — NotFound.
  rpc GetSubscriptionToken(GetSubscriptionTokenRequest) returns (GetSubscriptionTokenResponse);

  // RegisterDeviceTouch — best-effort upsert строки в active_connections
  // когда клиент-приложение тянет subscription URL. Передаём "сырое"
  // значение User-Agent, vpn-service нормализует во вменяемый device_identifier
  // (см. internal/service/ua.go). Сервер не привязывается — server_id=NULL,
  // потому что subscription отдаёт конфиги всех серверов сразу.
  // Идемпотентно по (vpn_user_id, device_identifier): обновляет last_seen.
  rpc RegisterDeviceTouch(RegisterDeviceTouchRequest) returns (RegisterDeviceTouchResponse);
}

message DisableVPNUserRequest {
  int64 user_id = 1;
}

message DisableVPNUserResponse {
  bool success = 1;
  int32 servers_cleaned = 2;  // сколько xray inbound'ов обработано
}

message ResyncServerRequest {
  int32 server_id = 1;
}

message ResyncServerResponse {
  int32 users_total = 1;
  int32 users_added = 2;       // успешно добавлено в inbound
  int32 users_already = 3;     // уже были (idempotent)
  int32 users_failed = 4;      // ошибки (не "already exists")
}

message CreateVPNUserRequest {
  int64 user_id = 1;
  int64 subscription_id = 2;
}

message CreateVPNUserResponse {
  VPNUser vpn_user = 1;
}

message GetVPNUserRequest {
  int64 user_id = 1;
}

message GetVPNUserResponse {
  VPNUser vpn_user = 1;
}

message GetVLESSLinkRequest {
  int64 user_id = 1;
  int32 server_id = 2;
  // device_identifier — имя устройства ("iPhone", "PC-work"). Если передан,
  // запись создаётся/обновляется в active_connections и применяется проверка
  // max_devices подписки. Если пусто — просто возвращается ссылка без учёта
  // слотов (служебный вызов / админские сценарии).
  string device_identifier = 3;
}

message GetVLESSLinkResponse {
  string vless_link = 1;
  Server server = 2;
  // Состояние слотов после выдачи ссылки (для UI — чтобы показать "2/2").
  int32 current_devices = 3;
  int32 max_devices = 4;
  // ID записи в active_connections (если device_identifier был передан)
  int64 connection_id = 5;
}

message ListServersRequest {
  bool active_only = 1;
}

message ListServersResponse {
  repeated Server servers = 1;
}

message GetActiveConnectionsRequest {
  int64 user_id = 1;
}

message GetActiveConnectionsResponse {
  repeated ActiveConnection connections = 1;
  int32 total_connections = 2;
  int32 max_devices = 3;
}

message DisconnectDeviceRequest {
  int64 connection_id = 1;
}

message DisconnectDeviceResponse {
  bool success = 1;
}

message VPNUser {
  int64 id = 1;
  int64 user_id = 2;
  int64 subscription_id = 3;
  string uuid = 4;
  string email = 5;
  string flow = 6;
  string created_at = 7;
  // Публичный токен для URL подписки `/api/v1/subscription/{token}`.
  string subscription_token = 8;
}

message GetSubscriptionConfigRequest {
  string token = 1;
}

message GetSubscriptionConfigResponse {
  // Данные юзера (uuid для VLESS, email для идентификации в Xray).
  VPNUser vpn_user = 1;
  // Активные сервера — для каждого отдаём отдельный VLESS-outbound в подписке.
  repeated Server servers = 2;
  // Окно подписки — для заголовка Subscription-Userinfo (expire=unix).
  string expires_at = 3;
  // Полезно клиенту знать лимит устройств (UI-подсказка).
  int32 max_devices = 4;
}

message GetSubscriptionTokenRequest {
  int64 user_id = 1;
}

message GetSubscriptionTokenResponse {
  string subscription_token = 1;
  string expires_at = 2;
}

message Server {
  int32 id = 1;
  string name = 2;
  string location = 3;
  string country_code = 4;
  string host = 5;
  int32 port = 6;
  string public_key = 7;
  string short_id = 8;
  string dest = 9;
  string server_names = 10;
  bool is_active = 11;
  int32 load_percent = 12;
}

message ActiveConnection {
  int64 id = 1;
  int64 vpn_user_id = 2;
  // server_id может быть 0 для "subscription-touch" записей (клиент-приложение
  // тянуло subscription URL и явного сервера ещё нет). UI должен трактовать
  // 0 как "сервер не определён" и server_name тогда пустой.
  int32 server_id = 3;
  string server_name = 4;
  string device_identifier = 5;
  string connected_at = 6;
  string last_seen = 7;
}

// RegisterDeviceTouch — для subscription-flow. См. RPC выше.
message RegisterDeviceTouchRequest {
  // Берём именно subscription_token (а не user_id), чтобы handler в gateway
  // не делал лишний lookup — он и так уже по token'у работает. vpn-service
  // сам резолвит token → vpn_user.
  string subscription_token = 1;
  // Сырой User-Agent. Может быть пустым (некоторые клиенты не шлют) — тогда
  // нормализуем в "Unknown client".
  string user_agent = 2;
}

message RegisterDeviceTouchResponse {
  // ID строки в active_connections (новой или существующей).
  int64 connection_id = 1;
  // Нормализованный лейбл, который записан в device_identifier
  // ("Happ / iOS", "Hiddify / Android", "Unknown client", ...).
  string device_identifier = 2;
  // true если запись только что создана (для метрик/логов).
  bool created = 3;
}
