syntax = "proto3";

package auth.v1;

option go_package = "github.com/vpn/shared/pkg/proto/auth/v1";

service AuthService {
  // Валидация Telegram initData и создание/обновление пользователя
  rpc ValidateTelegramUser(ValidateTelegramUserRequest) returns (ValidateTelegramUserResponse);
  
  // Получение информации о пользователе
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  
  // Обновление роли пользователя (только для админов)
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);

  // Self-service смена своей роли (user ↔ partner). Юзер дёргает сам.
  // Запрещено переключаться в admin или менять чужую роль.
  // Возвращает обновлённого юзера + СВЕЖИЙ JWT (со старым role в payload
  // фронт получит ошибку при следующем запросе).
  rpc SelfUpdateRole(SelfUpdateRoleRequest) returns (SelfUpdateRoleResponse);
  
  // Бан/разбан пользователя (только для админов)
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
  
  // Проверка JWT токена
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);

  // Сохраняет pending реферальный токен по telegram_id (до регистрации
  // юзера в Mini App). Вызывается ботом при /start ref_<token>.
  // Upsert: если запись уже есть — перезаписываем (последний clicker побеждает).
  rpc SetPendingReferral(SetPendingReferralRequest) returns (SetPendingReferralResponse);

  // Фиксирует факт нажатия /start в боте (для воронки бот → Mini App).
  // ON CONFLICT DO NOTHING — повторные /start не перезаписывают started_at.
  // opened_app_at проставится позже в ValidateTelegramUser при первом
  // открытии Mini App тем же telegram_id.
  // Если start_param имеет префикс "src_<slug>" и кампания активна,
  // в bot_starts.campaign_id будет проставлен её id.
  rpc RecordBotStart(RecordBotStartRequest) returns (RecordBotStartResponse);

  // Сохраняет pending атрибуцию к маркетинговой кампании по telegram_id
  // (аналог SetPendingReferral, но для воронок). Вызывается ботом при
  // /start src_<slug>. Upsert: последний clicker побеждает.
  // Если slug не найден или кампания архивирована — возвращает stored=false.
  rpc SetPendingCampaign(SetPendingCampaignRequest) returns (SetPendingCampaignResponse);
}

message ValidateTelegramUserRequest {
  string init_data = 1; // Telegram WebApp initData
  // Опциональный реферальный токен (без префикса ref_), извлечённый
  // фронтом из start_param. Используется ТОЛЬКО при создании нового юзера —
  // существующие пользователи игнорируются (нельзя задним числом стать рефералом).
  string ref_token = 2;
}

message ValidateTelegramUserResponse {
  User user = 1;
  string jwt_token = 2; // JWT для внутренней авторизации
  bool is_new_user = 3; // true если юзер был создан только что (для trial-активации в Gateway)
  // true если реферальная регистрация прошла успешно (для UI feedback).
  bool referral_registered = 4;
}

message GetUserRequest {
  int64 user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRoleRequest {
  int64 user_id = 1;
  string role = 2; // user, partner, admin
}

message UpdateUserRoleResponse {
  User user = 1;
}

message SelfUpdateRoleRequest {
  int64 user_id = 1; // Из JWT — gateway проставляет
  string role = 2;   // user | partner (admin запрещён)
}

message SelfUpdateRoleResponse {
  User user = 1;
  string jwt_token = 2; // Свежий JWT с новой ролью в payload
}

message BanUserRequest {
  int64 user_id = 1;
  bool is_banned = 2;
}

message BanUserResponse {
  User user = 1;
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  int64 user_id = 1;
  string role = 2;
  bool is_valid = 3;
}

message SetPendingReferralRequest {
  int64 telegram_id = 1;
  string ref_token = 2; // Чистый токен (без префикса ref_)
}

message SetPendingReferralResponse {
  bool stored = 1; // true если успешно сохранили
}

message RecordBotStartRequest {
  int64  telegram_id = 1;
  string username    = 2;
  string first_name  = 3;
  string start_param = 4; // raw param (например "ref_<token>" или пусто)
}

message RecordBotStartResponse {
  bool stored = 1; // true если запись была вставлена (первое нажатие /start)
  // Кампания, к которой удалось атрибутировать /start (если start_param =
  // "src_<slug>" и кампания активна). 0 = не атрибутирован.
  int64 campaign_id = 2;
}

message SetPendingCampaignRequest {
  int64  telegram_id = 1;
  string slug        = 2; // чистый slug (без префикса src_)
}

message SetPendingCampaignResponse {
  bool   stored      = 1;
  int64  campaign_id = 2; // 0 если slug не найден / кампания архивирована
}

message User {
  int64 id = 1;
  int64 telegram_id = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  string photo_url = 6;
  string language_code = 7;
  string role = 8;
  bool is_banned = 9;
  string balance = 10; // Decimal as string
  string created_at = 11;
  string updated_at = 12;
  string last_active_at = 13;
}
